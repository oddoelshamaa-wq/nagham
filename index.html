    <!DOCTYPE html>
    <html lang="ar" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>إلى أغلى موظفة في قلبي</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <!-- خلفية الخدعة البصرية -->
        <div class="illusion-bg"></div>

        <div class="container">
            <div class="card">
                <h1 class="glitch" data-text="مقدرش علي زعل الموظفة بتاعتي">مقدرش علي زعل الموظفة بتاعتي</h1>
                
                <div class="love-text">
                    <p class="fade-in">يا ست البنات.. يا اللي ضحكتك بتنور يومي.</p>
                    <p class="fade-in delay-1">الدنيا كلها تزعل إلا إنتي، لأنك مش مجرد حد في حياتي..</p>
                    <p class="fade-in delay-2">إنتي "الموطفه" اللي ممشية قلبي على هواها.</p>
                </div>

                <!-- مكان الصورة الجديد -->
                <div class="img-container fade-in">
                    <div class="image-3d">
                        <!-- حط رابط صورتك هنا -->
                        <img src="2a0a654f-a33d-4296-bd8a-9a2360f68a3a.jpg" alt="صورة الموظفة">
                    </div>
                </div>

                <div class="heart-container">
                    <div class="heart"></div>
                </div>

                <p class="signature">أنا أسف.. صافي يا لبن؟ ❤️</p>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
    </html>
