<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أنا أسف يا ست البنات ❤️</title>
    
    <!-- مكتبة زينة الاحتفال -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #ff2a6d;
            --secondary: #05d9e8;
            --dark: #01012b;
            /* ألوان اللوجو الجديد */
            --logo-start: #8195ff; 
            --logo-end: #33ccff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            width: 100%; height: 100vh;
            background: var(--dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* خلفية نيون متحركة خفيفة */
        .bg {
            position: fixed; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a4a 0%, #01012b 100%);
            z-index: -1;
        }

        .container { width: 95%; max-width: 350px; perspective: 1000px; }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px 15px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transform-style: preserve-3d; transition: all 0.5s ease;
            display: flex; flex-direction: column; align-items: center;
        }

        /* تنسيق اللوجو ELSHAMAA */
        .logo-text {
            font-family: 'Arial Black', Gadget, sans-serif;
            font-weight: 900;
            font-size: 1.8rem;
            letter-spacing: -1px;
            background: linear-gradient(90deg, var(--logo-start) 0%, var(--logo-end) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            text-transform: uppercase;
            transform: translateZ(40px);
            filter: drop-shadow(0 0 5px rgba(51, 204, 255, 0.3));
        }

        /* تنسيق الصورة الـ 3D */
        .photo-area {
            width: 100px; height: 100px; margin-bottom: 15px;
            transform: translateZ(30px);
        }
        .photo-area img {
            width: 100%; height: 100%; border-radius: 50%;
            object-fit: cover; border: 3px solid white;
            box-shadow: 0 0 15px var(--secondary);
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* حاوية الفيديو */
        #videoArea {
            display: none; 
            width: 100%; 
            height: 300px; 
            overflow: hidden; 
            border-radius: 15px;
            border: 2px solid var(--secondary);
            margin-bottom: 10px;
            position: relative;
            animation: zoomIn 0.5s ease-out;
        }

        .tiktok-embed {
            margin: 0 !important;
            padding: 0 !important;
            transform: scale(0.75);
            transform-origin: top center;
            position: absolute;
            top: -45px;
            left: 0;
            width: 100% !important;
        }

        .glitch-text {
            color: white; font-size: 1.3rem; font-weight: bold;
            text-shadow: 2px 2px var(--primary); margin-bottom: 10px;
            transform: translateZ(20px);
        }

        .msg-box { color: #ccc; font-size: 0.95rem; line-height: 1.4; margin-bottom: 15px; }

        .extra-speech {
            display: none;
            color: #fff; font-size: 0.9rem; line-height: 1.6;
            animation: fadeIn 1.5s ease forwards;
        }
        .extra-speech p { margin-bottom: 5px; }
        .final-word {
            color: var(--secondary); font-weight: bold; font-size: 1rem;
            text-shadow: 0 0 10px var(--secondary); margin-top: 10px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn {
            background: transparent; border: 2px solid var(--secondary);
            color: var(--secondary); padding: 12px 30px; border-radius: 50px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 10px var(--secondary); transition: 0.3s;
            transform: translateZ(50px);
        }
        .btn:active { transform: scale(0.9); background: var(--secondary); color: #000; }

        .heart { position: absolute; font-size: 20px; pointer-events: none; animation: fly 1.5s ease-out forwards; }
        @keyframes fly { to { transform: translateY(-100px) scale(0); opacity: 0; } }
    </style>
</head>
<body>

<div class="bg"></div>

<div class="container">
    <div class="card" id="card">
        <!-- إضافة اللوجو هنا -->
        <div class="logo-text">ELSHAMAA</div>

        <!-- منطقة الصورة -->
        <div id="photoArea" class="photo-area">
            <img src="2a0a654f-a33d-4296-bd8a-9a2360f68a3a.jpg" alt="الموظفة الغالية">
        </div>

        <!-- منطقة الفيديو -->
        <div id="videoArea">
            <blockquote class="tiktok-embed" data-video-id="7554455761619930375">
                <section></section>
            </blockquote>
            <script async src="https://www.tiktok.com/embed.js"></script>
        </div>

        <h1 id="title" class="glitch-text">مقدرش علي زعل الموظفة بتاعتي</h1>
        
        <div id="msgBox" class="msg-box">
            <p>يا ست البنات.. ضحكتك بتنور يومي.</p>
            <p>الدنيا كلها تزعل إلا إنتي ❤️</p>
        </div>

        <!-- الكلام الرومانسي المخفي -->
        <div id="extraSpeech" class="extra-speech">
            <p>عارف إن قلبك أبيض ومبيشيلش..</p>
            <p>وانتي عارفة إنك عندي بالدنيا وما فيها.</p>
            <p>مقدرش أعدي يومي وانتي شايلة مني ذرة زعل..</p>
            <p class="final-word">بحبك يا أحلى موظفة في حياتي! ❤️</p>
        </div>

        <button id="reconcileBtn" class="btn">صافي يا لبن؟ ❤️</button>
    </div>
</div>

<script>
    const btn = document.getElementById('reconcileBtn');
    const photo = document.getElementById('photoArea');
    const video = document.getElementById('videoArea');
    const title = document.getElementById('title');
    const msgBox = document.getElementById('msgBox');
    const extraSpeech = document.getElementById('extraSpeech');
    const card = document.getElementById('card');

    // 1. حركة الكارت مع اللمس (3D Parallax) للموبايل والماوس
    function handleMove(e) {
        const xVal = e.touches ? e.touches[0].pageX : e.pageX;
        const yVal = e.touches ? e.touches[0].pageY : e.pageY;
        const x = (window.innerWidth / 2 - xVal) / 15;
        const y = (window.innerHeight / 2 - yVal) / 15;
        card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
    }

    document.addEventListener('touchmove', handleMove, {passive: true});
    document.addEventListener('mousemove', handleMove);

    // 2. المفاجأة عند الضغط
    btn.addEventListener('click', () => {
        photo.style.display = 'none';
        msgBox.style.display = 'none';
        btn.style.display = 'none';
        
        title.innerText = "أيوة كدة يا قمر! 😍";
        title.style.fontSize = "1.1rem";
        
        video.style.display = 'block';
        
        setTimeout(() => {
            extraSpeech.style.display = 'block';
        }, 800);

        // انفجار القلوب (Confetti)
        const end = Date.now() + 4000;
        (function frame() {
            confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0, y:0.8 }, colors: ['#ff2a6d', '#05d9e8'] });
            confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1, y:0.8 }, colors: ['#ff2a6d', '#05d9e8'] });
            if (Date.now() < end) requestAnimationFrame(frame);
        }());
    });

    // 3. تأثير قلوب عند اللمس
    document.addEventListener('touchstart', (e) => {
        const h = document.createElement('div');
        h.innerHTML = '❤️'; h.className = 'heart';
        h.style.left = e.touches[0].clientX + 'px';
        h.style.top = e.touches[0].clientY + 'px';
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 1500);
    });
</script>

</body>
</html>
