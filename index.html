    <!DOCTYPE html>
    <html lang="ar" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>أنا أسف ❤️</title>
        <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
        <style>
            :root {
                --primary: #ff2a6d;
                --secondary: #05d9e8;
                --dark: #01012b;
            }

            * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

            body {
                width: 100%; height: 100vh;
                background: var(--dark);
                font-family: 'Segoe UI', sans-serif;
                overflow: hidden;
                display: flex; justify-content: center; align-items: center;
            }

            /* خلفية خفيفة عشان متحملش عالموبايل */
            .bg {
                position: fixed; width: 100%; height: 100%;
                background: radial-gradient(circle at center, #1a1a4a 0%, #01012b 100%);
                z-index: -1;
            }

            .container { width: 92%; max-width: 360px; perspective: 1500px; }

            .card {
                background: rgba(255, 255, 255, 0.08);
                backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
                border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1);
                padding: 20px 15px; text-align: center;
                box-shadow: 0 20px 40px rgba(0,0,0,0.4);
                transform-style: preserve-3d; transition: transform 0.1s;
            }

            /* الصورة: صغرنا الحجم عشان يناسب الموبايل */
            .photo-area {
                width: 110px; height: 110px; margin: 0 auto 15px;
                position: relative; transform-style: preserve-3d;
            }

            .photo-area img {
                width: 100%; height: 100%; border-radius: 50%;
                object-fit: cover; border: 3px solid white;
                box-shadow: 0 0 20px var(--secondary);
                transform: translateZ(40px);
                animation: float 3s ease-in-out infinite;
            }

            /* منطقة الفيديو: هتفتح بمقاس الموبايل */
            #videoArea {
                display: none; width: 100%; border-radius: 15px;
                overflow: hidden; border: 2px solid var(--secondary);
                margin-bottom: 15px; animation: slideIn 0.5s ease-out;
            }

            .glitch-text {
                color: white; font-size: 1.3rem; font-weight: bold;
                text-shadow: 2px 2px var(--primary); margin-bottom: 10px;
            }

            .msg { color: #ccc; font-size: 0.95rem; line-height: 1.4; margin-bottom: 20px; }

            .typewriter {
                display: inline-block; overflow: hidden; white-space: nowrap;
                border-right: 2px solid var(--secondary);
                animation: typing 2.5s steps(25) forwards;
            }

            .btn {
                background: transparent; border: 2px solid var(--secondary);
                color: var(--secondary); padding: 12px 30px; border-radius: 50px;
                font-size: 1rem; font-weight: bold; transition: 0.3s;
                box-shadow: 0 0 10px var(--secondary);
            }

            .btn:active { background: var(--secondary); color: black; transform: scale(0.9); }

            @keyframes float { 0%, 100% { transform: translateZ(40px) translateY(0); } 50% { transform: translateZ(50px) translateY(-10px); } }
            @keyframes typing { from { width: 0; } to { width: 100%; } }
            @keyframes slideIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

            .heart { position: absolute; font-size: 20px; pointer-events: none; animation: fly 1.5s ease-out forwards; }
            @keyframes fly { to { transform: translateY(-100px); opacity: 0; } }
        </style>
    </head>
    <body>

    <div class="bg"></div>

    <div class="container">
        <div class="card" id="card">
            <!-- الصورة -->
            <div id="photoContainer" class="photo-area">
                <img src="2a0a654f-a33d-4296-bd8a-9a2360f68a3a.jpg" alt="الموظفة">
            </div>

            <!-- الفيديو (بيظهر مكان الصورة) -->
            <div id="videoArea">
                <blockquote class="tiktok-embed" data-video-id="7554455761619930375" style="max-width: 100%; margin:0;">
                    <section></section>
                </blockquote>
                <script async src="https://www.tiktok.com/embed.js"></script>
            </div>

            <h1 class="glitch-text">مقدرش علي زعل الموطفه بتاعتي</h1>
            
            <div class="msg">
                <span class="typewriter">يا ست البنات.. ضحكتك بتنور يومي.</span>
                <p id="extra" style="opacity:0; margin-top:5px; transition:1s;">صافي يا لبن؟ ❤️</p>
            </div>

            <button id="btn" class="btn">صافي يا لبن؟ ❤️</button>
        </div>
    </div>

    <script>
        const card = document.getElementById('card');
        const btn = document.getElementById('btn');
        const photo = document.getElementById('photoContainer');
        const video = document.getElementById('videoArea');
        const extra = document.getElementById('extra');

        // حركة 3D خفيفة جداً للموبايل
        document.addEventListener('touchmove', (e) => {
            const x = (window.innerWidth / 2 - e.touches[0].pageX) / 15;
            const y = (window.innerHeight / 2 - e.touches[0].pageY) / 15;
            card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        }, {passive: true});

        setTimeout(() => extra.style.opacity = "1", 2800);

        btn.addEventListener('click', () => {
            btn.style.display = 'none'; // نخفي الزرار عشان نوفر مساحة للفيديو
            photo.style.display = 'none';
            video.style.display = 'block';

            // انفجار قلوب
            const end = Date.now() + 4000;
            (function frame() {
                confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0, y:0.7 }, colors: ['#ff2a6d', '#05d9e8'] });
                confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1, y:0.7 }, colors: ['#ff2a6d', '#05d9e8'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        });

        document.addEventListener('touchstart', (e) => {
            const h = document.createElement('div');
            h.innerHTML = '❤️'; h.className = 'heart';
            h.style.left = e.touches[0].clientX + 'px';
            h.style.top = e.touches[0].clientY + 'px';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 1500);
        });
    </script>

    </body>
    </html>
